services:
  - type: web
    name: kare-live-backend
    region: singapore # APAC; omit defaults to oregon (high RTT India ↔ US worker)
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    # Free spins down after idle → long cold starts + dead LiveKit worker until wake; voice apps need always-on.
    plan: free # upgrade to starter (~$7/mo) for lowest practical latency on Render
    healthCheckPath: /health

    envVars:
      - key: LIVEKIT_URL
        sync: false
      - key: LIVEKIT_API_KEY
        sync: false
      - key: LIVEKIT_API_SECRET
        sync: false
      - key: LIVEKIT_AGENT_NAME
        value: kare-appointment-agent
      - key: START_EMBEDDED_LIVEKIT_WORKER
        value: "false"
      - key: LIVEKIT_MAX_CALL_SECONDS
        value: "300"
      - key: LIVEKIT_AVATAR_PROVIDER
        value: none
      - key: LIVEKIT_AVATAR_PARTICIPANT_IDENTITY
        value: kare-avatar-agent
      - key: LIVEKIT_AVATAR_PARTICIPANT_NAME
        value: Kare Avatar
      - key: BEY_API_KEY
        sync: false
      - key: BEY_AVATAR_ID
        sync: false
      - key: TAVUS_API_KEY
        sync: false
      - key: TAVUS_REPLICA_ID
        sync: false
      - key: TAVUS_PERSONA_ID
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: CLAUDE_MODEL
        value: claude-haiku-4-5-20251001
      - key: DEEPGRAM_API_KEY
        sync: false
      - key: DEEPGRAM_MODEL
        value: nova-3
      - key: DEEPGRAM_LANGUAGE
        value: en-IN
      - key: SARVAM_API_KEY
        sync: false
      - key: SARVAM_LANGUAGE_CODE
        value: en-IN
      - key: SARVAM_TTS_MODEL
        value: bulbul:v3
      - key: SARVAM_SPEAKER
        value: shubh
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_BASE_URL
        value: https://openrouter.ai/api/v1
      - key: OPENROUTER_MODEL
        value: google/gemini-3-flash
      - key: POST_CALL_AI_EXTRACTION_ENABLED
        value: "true"
      - key: CORS_ORIGINS
        value: "*"

  # LiveKit agent worker (always-on). Render does not allow free tier for workers.
  # Same repo + branch as the web service when using Blueprint sync / CI deploy.
  # Do not run a second worker elsewhere (e.g. Fly) with the same LIVEKIT_AGENT_NAME — only one should register.
  - type: worker
    name: kare-live-livekit-worker
    region: singapore
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python -m app.agent.run_worker start
    plan: starter

    envVars:
      - key: LIVEKIT_URL
        sync: false
      - key: LIVEKIT_API_KEY
        sync: false
      - key: LIVEKIT_API_SECRET
        sync: false
      - key: LIVEKIT_AGENT_NAME
        value: kare-appointment-agent
      - key: START_EMBEDDED_LIVEKIT_WORKER
        value: "false"
      - key: LIVEKIT_MAX_CALL_SECONDS
        value: "300"
      - key: LIVEKIT_AVATAR_PROVIDER
        value: none
      - key: LIVEKIT_AVATAR_PARTICIPANT_IDENTITY
        value: kare-avatar-agent
      - key: LIVEKIT_AVATAR_PARTICIPANT_NAME
        value: Kare Avatar
      - key: BEY_API_KEY
        sync: false
      - key: BEY_AVATAR_ID
        sync: false
      - key: TAVUS_API_KEY
        sync: false
      - key: TAVUS_REPLICA_ID
        sync: false
      - key: TAVUS_PERSONA_ID
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: CLAUDE_MODEL
        value: claude-haiku-4-5-20251001
      - key: DEEPGRAM_API_KEY
        sync: false
      - key: DEEPGRAM_MODEL
        value: nova-3
      - key: DEEPGRAM_LANGUAGE
        value: en-IN
      - key: SARVAM_API_KEY
        sync: false
      - key: SARVAM_LANGUAGE_CODE
        value: en-IN
      - key: SARVAM_TTS_MODEL
        value: bulbul:v3
      - key: SARVAM_SPEAKER
        value: shubh
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_BASE_URL
        value: https://openrouter.ai/api/v1
      - key: OPENROUTER_MODEL
        value: google/gemini-3-flash
      - key: POST_CALL_AI_EXTRACTION_ENABLED
        value: "true"
