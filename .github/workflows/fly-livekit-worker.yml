# Requires repo secret: FLY_API_TOKEN (Fly dashboard → tokens).
# Create/select Fly app name matching fly.toml → app = "..."

name: Deploy LiveKit worker (Fly.io)

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/fly-livekit-worker.yml"
      - "fly.toml"
      - "Dockerfile.worker"
      - "requirements.txt"
      - "app/**"

jobs:
  deploy:
    name: flyctl deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@v1

      - name: Deploy worker
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
